<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AEN Creative Premium</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1/bundled/lenis.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="loader"><h1>AEN Creative</h1></div>
<div class="cursor"></div>
<canvas id="bg"></canvas>

<header class="glass">
  <div class="logo">AEN.</div>
  <button id="menuBtn">Menu</button>
</header>

<nav id="mobileMenu">
  <a href="#">Home</a><a href="#">Projects</a><a href="#">Contact</a>
</nav>

<section class="hero">
<h1>Premium Creative Experiences</h1>
<button class="magnetic">View Projects</button>
</section>

<section class="stats">
<div><span class="counter" data-target="150">0</span>+ Projects</div>
<div><span class="counter" data-target="98">0</span>% Satisfaction</div>
</section>

<section class="horizontal">
<div class="track">
<div class="panel">Project 01</div>
<div class="panel">Project 02</div>
<div class="panel">Project 03</div>
</div>
</section>

<section class="contact glass">
<h2>Let's Build Something Extraordinary</h2>
</section>

<script src="js/main.js"></script>
</body>
</html>
